<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东省建设工程造价咨询收费计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fafafa;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .input-group input {
            flex: 1;
        }
        
        .unit {
            color: #666;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .calculate-btn:active {
            transform: scale(0.98);
        }
        
        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .result-card.show {
            display: block;
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }
        
        .result-amount {
            font-size: 2.2rem;
            color: #1e3c72;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .result-detail {
            background: white;
            border-radius: 12px;
            padding: 16px;
            font-size: 0.85rem;
            color: #555;
            line-height: 1.6;
        }
        
        .result-detail p {
            margin-bottom: 8px;
        }
        
        .result-detail strong {
            color: #333;
        }
        
        .note {
            margin-top: 20px;
            padding: 16px;
            background: #fff8e1;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #666;
            line-height: 1.6;
        }
        
        .note-title {
            font-weight: 600;
            color: #f57c00;
            margin-bottom: 8px;
        }
        
        /* 特殊输入区域样式 */
        .special-inputs {
            display: none;
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin-top: 12px;
        }
        
        .special-inputs.show {
            display: block;
        }
        
        .tier-info {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: #1976d2;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
        
        /* 响应式优化 */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.1rem;
            }
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .tab {
            padding: 10px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            border: none;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .professionals-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .prof-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
        }
        
        .prof-item label {
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        
        .prof-item input {
            padding: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>广东省建设工程造价咨询收费计算器</h1>
            <p>依据粤价函〔2011〕742号文件</p>
        </div>
        
        <div class="content">
            <!-- 快速选择标签 -->
            <div class="tabs">
                <button class="tab active" onclick="quickSelect('estimate')">投资估算</button>
                <button class="tab" onclick="quickSelect('budget')">工程概算</button>
                <button class="tab" onclick="quickSelect('settlement')">工程结算</button>
                <button class="tab" onclick="quickSelect('audit')">结算审核</button>
                <button class="tab" onclick="quickSelect('control')">全过程</button>
            </div>
            
            <div class="form-group">
                <label>咨询项目名称</label>
                <select id="projectType" onchange="handleProjectChange()">
                    <option value="1">1. 投资估算的编制或审核</option>
                    <option value="2">2. 工程概算的编制或审核</option>
                    <option value="3-1">3.1 单独编制或审核工程量清单（清单计价法）</option>
                    <option value="3-2">3.2 单独编制或审核预算造价（清单计价法）</option>
                    <option value="3-3">3.3 编制或审核预算造价（定额计价法）</option>
                    <option value="4">4. 工程结算的编制</option>
                    <option value="5-1">5.1 工程结算审核（基本收费）</option>
                    <option value="5-2">5.2 工程结算审核（效益收费）</option>
                    <option value="6">6. 施工阶段全过程造价控制</option>
                    <option value="7-1">7.1 工程造价纠纷鉴证（鉴证后标的额）</option>
                    <option value="7-2">7.2 工程造价纠纷鉴证（争议差额）</option>
                    <option value="8">8. 钢筋及预埋件计算</option>
                    <option value="9">9. 工程造价咨询工日收费标准</option>
                </select>
            </div>
            
            <!-- 普通收费基数输入 -->
            <div class="form-group" id="baseAmountGroup">
                <label>收费基数</label>
                <div class="input-group">
                    <input type="number" id="baseAmount" placeholder="请输入金额" step="0.01">
                    <span class="unit" id="baseUnit">万元</span>
                </div>
                <div class="tier-info" id="tierInfo"></div>
            </div>
            
            <!-- 结算审核特殊输入 -->
            <div class="special-inputs" id="auditInputs">
                <div class="form-group">
                    <label>送审结算价</label>
                    <div class="input-group">
                        <input type="number" id="auditAmount" placeholder="请输入送审金额" step="0.01">
                        <span class="unit">万元</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>核减额（绝对值）</label>
                    <div class="input-group">
                        <input type="number" id="reduceAmount" placeholder="请输入核减金额" step="0.01">
                        <span class="unit">万元</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>核增额（绝对值，如有）</label>
                    <div class="input-group">
                        <input type="number" id="increaseAmount" placeholder="请输入核增金额" step="0.01" value="0">
                        <span class="unit">万元</span>
                    </div>
                </div>
            </div>
            
            <!-- 钢筋计算特殊输入 -->
            <div class="special-inputs" id="steelInputs">
                <div class="form-group">
                    <label>钢筋使用量</label>
                    <div class="input-group">
                        <input type="number" id="steelAmount" placeholder="请输入钢筋吨数" step="0.01">
                        <span class="unit">吨</span>
                    </div>
                </div>
            </div>
            
            <!-- 工日收费特殊输入 -->
            <div class="special-inputs" id="manDayInputs">
                <div class="form-group">
                    <label>专业人员配置</label>
                    <div class="professionals-group">
                        <div class="prof-item">
                            <label>高级工程师注册造价师（190元/小时）</label>
                            <input type="number" id="seniorHours" placeholder="小时数" step="0.5" value="0">
                        </div>
                        <div class="prof-item">
                            <label>注册造价师/高级职称（150元/小时）</label>
                            <input type="number" id="certifiedHours" placeholder="小时数" step="0.5" value="0">
                        </div>
                        <div class="prof-item">
                            <label>中级资格专业人员（100元/小时）</label>
                            <input type="number" id="intermediateHours" placeholder="小时数" step="0.5" value="0">
                        </div>
                        <div class="prof-item">
                            <label>初级资格专业人员（60元/小时）</label>
                            <input type="number" id="juniorHours" placeholder="小时数" step="0.5" value="0">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 纠纷鉴证特殊选项 -->
            <div class="special-inputs" id="disputeInputs">
                <div class="checkbox-group">
                    <input type="checkbox" id="bothParties" onchange="updateDisputeRate()">
                    <label for="bothParties" style="margin: 0;">双方均有造价（争议差额1000万以下5%，以上4%）</label>
                </div>
                <div class="tier-info" id="disputeInfo" style="margin-top: 10px;">
                    原被告单方有造价或双方均无造价：按差额定率累进计费
                </div>
            </div>
            
            <button class="calculate-btn" onclick="calculate()">计算收费金额</button>
            
            <div class="result-card" id="resultCard">
                <div class="result-title">计算结果</div>
                <div class="result-amount" id="resultAmount">¥0.00</div>
                <div class="result-detail" id="resultDetail"></div>
            </div>
            
            <div class="note">
                <div class="note-title">重要说明</div>
                <p>1. 以上收费标准为最高收费标准，委托双方可在最高收费标准范围内协商确定具体收费标准。</p>
                <p>2. 造价咨询费不足2000元的按2000元收取。</p>
                <p>3. 工程主材无论是否计入工程造价，均应计入取费基数。合同包干价加签证项目，包干价部分应计入取费基数。</p>
                <p>4. 工程预算的编制或审核、工程结算的编制或审核的收费标准不包括钢筋及预埋件计算，凡要求钢筋及预埋件计算的按相对应的收费标准另行收费。</p>
            </div>
        </div>
    </div>

    <script>
        // 收费费率表（差额定率累进）
        const rateTables = {
            // 1. 投资估算
            '1': {
                name: '投资估算的编制或审核',
                baseName: '估算价',
                rates: [
                    { limit: 100, rate: 0.013 },
                    { limit: 500, rate: 0.011 },
                    { limit: 1000, rate: 0.009 },
                    { limit: 5000, rate: 0.007 },
                    { limit: 10000, rate: 0.005 },
                    { limit: Infinity, rate: 0.004 }
                ],
                progressive: true
            },
            // 2. 工程概算
            '2': {
                name: '工程概算的编制或审核',
                baseName: '概算价',
                rates: [
                    { limit: 100, rate: 0.020 },
                    { limit: 500, rate: 0.018 },
                    { limit: 1000, rate: 0.016 },
                    { limit: 5000, rate: 0.013 },
                    { limit: 10000, rate: 0.012 },
                    { limit: Infinity, rate: 0.011 }
                ],
                progressive: true
            },
            // 3.1 工程量清单（清单计价法）
            '3-1': {
                name: '单独编制或审核工程量清单（清单计价法）',
                baseName: '预算造价（预算价、招标控制价、投标报价）',
                rates: [
                    { limit: 100, rate: 0.030 },
                    { limit: 500, rate: 0.025 },
                    { limit: 1000, rate: 0.024 },
                    { limit: 5000, rate: 0.022 },
                    { limit: 10000, rate: 0.020 },
                    { limit: Infinity, rate: 0.018 }
                ],
                progressive: true
            },
            // 3.2 预算造价（清单计价法）
            '3-2': {
                name: '单独编制或审核预算造价（清单计价法）',
                baseName: '预算造价（预算价、招标控制价、投标报价）',
                rates: [
                    { limit: 100, rate: 0.018 },
                    { limit: 500, rate: 0.016 },
                    { limit: 1000, rate: 0.014 },
                    { limit: 5000, rate: 0.012 },
                    { limit: 10000, rate: 0.009 },
                    { limit: Infinity, rate: 0.008 }
                ],
                progressive: true
            },
            // 3.3 预算造价（定额计价法）
            '3-3': {
                name: '编制或审核预算造价（定额计价法）',
                baseName: '预算造价（预算价、招标控制价、投标报价）',
                rates: [
                    { limit: 100, rate: 0.035 },
                    { limit: 500, rate: 0.030 },
                    { limit: 1000, rate: 0.028 },
                    { limit: 5000, rate: 0.027 },
                    { limit: 10000, rate: 0.024 },
                    { limit: Infinity, rate: 0.020 }
                ],
                progressive: true
            },
            // 4. 工程结算编制
            '4': {
                name: '工程结算的编制',
                baseName: '结算价',
                rates: [
                    { limit: 100, rate: 0.045 },
                    { limit: 500, rate: 0.040 },
                    { limit: 1000, rate: 0.035 },
                    { limit: 5000, rate: 0.033 },
                    { limit: 10000, rate: 0.030 },
                    { limit: Infinity, rate: 0.025 }
                ],
                progressive: true
            },
            // 5.1 结算审核基本收费
            '5-1': {
                name: '工程结算审核（基本收费）',
                baseName: '送审结算价',
                rates: [
                    { limit: 100, rate: 0.028 },
                    { limit: 500, rate: 0.025 },
                    { limit: 1000, rate: 0.022 },
                    { limit: 5000, rate: 0.016 },
                    { limit: 10000, rate: 0.013 },
                    { limit: Infinity, rate: 0.010 }
                ],
                progressive: true
            },
            // 6. 全过程造价控制
            '6': {
                name: '施工阶段全过程造价控制',
                baseName: '概算价',
                rates: [
                    { limit: 100, rate: 0.120 },
                    { limit: 500, rate: 0.110 },
                    { limit: 1000, rate: 0.100 },
                    { limit: 5000, rate: 0.090 },
                    { limit: 10000, rate: 0.080 },
                    { limit: Infinity, rate: 0.070 }
                ],
                progressive: true,
                note: '差额定率累进计费；不包驻场人员的费用'
            },
            // 7.1 纠纷鉴证（单方）
            '7-1': {
                name: '工程造价纠纷鉴证（单方）',
                baseName: '鉴证后标的额',
                rates: [
                    { limit: 100, rate: 0.120 },
                    { limit: 500, rate: 0.100 },
                    { limit: 1000, rate: 0.080 },
                    { limit: 5000, rate: 0.070 },
                    { limit: 10000, rate: 0.060 },
                    { limit: Infinity, rate: 0.050 }
                ],
                progressive: true,
                note: '原被告单方有造价或双方均无造价'
            },
            // 7.2 纠纷鉴证（双方有造价）
            '7-2': {
                name: '工程造价纠纷鉴证（双方有造价）',
                baseName: '争议差额',
                rates: [],
                progressive: false,
                fixedRate: 0.05, // 1000万以下5%，以上4%
                threshold: 1000,
                highRate: 0.04,
                note: '争议差额在1000万以下（含1000万）按5%收取，1000万以上按4%收取'
            }
        };
        
        // 快速选择
        function quickSelect(type) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            const map = {
                'estimate': '1',
                'budget': '2',
                'settlement': '4',
                'audit': '5-1',
                'control': '6'
            };
            
            document.getElementById('projectType').value = map[type];
            handleProjectChange();
        }
        
        // 处理项目类型变更
        function handleProjectChange() {
            const type = document.getElementById('projectType').value;
            
            // 隐藏所有特殊输入
            document.getElementById('baseAmountGroup').style.display = 'block';
            document.getElementById('auditInputs').classList.remove('show');
            document.getElementById('steelInputs').classList.remove('show');
            document.getElementById('manDayInputs').classList.remove('show');
            document.getElementById('disputeInputs').classList.remove('show');
            
            // 更新标签
            const config = rateTables[type];
            if (config) {
                document.getElementById('baseUnit').textContent = type === '8' ? '吨' : '万元';
                document.getElementById('tierInfo').textContent = generateTierInfo(config);
            }
            
            // 特殊处理
            if (type === '5-1' || type === '5-2') {
                document.getElementById('auditInputs').classList.add('show');
            } else if (type === '8') {
                document.getElementById('baseAmountGroup').style.display = 'none';
                document.getElementById('steelInputs').classList.add('show');
            } else if (type === '9') {
                document.getElementById('baseAmountGroup').style.display = 'none';
                document.getElementById('manDayInputs').classList.add('show');
            } else if (type.startsWith('7')) {
                document.getElementById('disputeInputs').classList.add('show');
                if (type === '7-2') {
                    document.getElementById('bothParties').checked = true;
                    updateDisputeRate();
                }
            }
            
            // 隐藏结果
            document.getElementById('resultCard').classList.remove('show');
        }
        
        // 生成费率区间说明
        function generateTierInfo(config) {
            if (!config.progressive) return config.note || '';
            
            const tiers = [
                '100万元以内：' + (config.rates[0].rate * 1000).toFixed(1) + '‰',
                '101-500万元：' + (config.rates[1].rate * 1000).toFixed(1) + '‰',
                '501-1000万元：' + (config.rates[2].rate * 1000).toFixed(1) + '‰',
                '1001-5000万元：' + (config.rates[3].rate * 1000).toFixed(1) + '‰',
                '5001万元-1亿元：' + (config.rates[4].rate * 1000).toFixed(1) + '‰',
                '1亿元以上：' + (config.rates[5].rate * 1000).toFixed(1) + '‰'
            ];
            return '费率区间：' + tiers.join(' | ');
        }
        
        // 更新纠纷鉴证费率显示
        function updateDisputeRate() {
            const bothParties = document.getElementById('bothParties').checked;
            const type = document.getElementById('projectType').value;
            
            if (bothParties) {
                document.getElementById('projectType').value = '7-2';
                document.getElementById('disputeInfo').textContent = '双方均有造价：争议差额在1000万以下（含1000万）按5%收取，1000万以上按4%收取';
            } else {
                document.getElementById('projectType').value = '7-1';
                document.getElementById('disputeInfo').textContent = '原被告单方有造价或双方均无造价：按差额定率累进计费（12‰-5‰）';
            }
            
            const config = rateTables[document.getElementById('projectType').value];
            document.getElementById('tierInfo').textContent = generateTierInfo(config);
        }
        
        // 差额定率累进计算
        function calculateProgressive(amount, rates) {
            let fee = 0;
            let remaining = amount;
            let prevLimit = 0;
            
            for (let tier of rates) {
                const tierAmount = Math.min(remaining, tier.limit - prevLimit);
                if (tierAmount <= 0) break;
                
                fee += tierAmount * tier.rate;
                remaining -= tierAmount;
                prevLimit = tier.limit;
                
                if (remaining <= 0) break;
            }
            
            return fee;
        }
        
        // 主计算函数
        function calculate() {
            const type = document.getElementById('projectType').value;
            let fee = 0;
            let detail = '';
            let baseAmount = 0;
            
            // 工日收费特殊计算
            if (type === '9') {
                const senior = parseFloat(document.getElementById('seniorHours').value) || 0;
                const certified = parseFloat(document.getElementById('certifiedHours').value) || 0;
                const intermediate = parseFloat(document.getElementById('intermediateHours').value) || 0;
                const junior = parseFloat(document.getElementById('juniorHours').value) || 0;
                
                const seniorFee = senior * 190;
                const certifiedFee = certified * 150;
                const intermediateFee = intermediate * 100;
                const juniorFee = junior * 60;
                
                fee = seniorFee + certifiedFee + intermediateFee + juniorFee;
                
                detail = `
                    <p><strong>计费明细：</strong></p>
                    <p>高级工程师注册造价师：${senior}小时 × 190元 = ${seniorFee.toFixed(2)}元</p>
                    <p>注册造价师/高级职称：${certified}小时 × 150元 = ${certifiedFee.toFixed(2)}元</p>
                    <p>中级资格专业人员：${intermediate}小时 × 100元 = ${intermediateFee.toFixed(2)}元</p>
                    <p>初级资格专业人员：${junior}小时 × 60元 = ${juniorFee.toFixed(2)}元</p>
                    <p><strong>合计：${fee.toFixed(2)}元</strong></p>
                `;
                
                // 工日收费不足2000元按2000元收取
                if (fee > 0 && fee < 2000) {
                    detail += `<p style="color:#f57c00;">注：按最低收费标准调整为2000元</p>`;
                    fee = 2000;
                }
                
                showResult(fee, detail);
                return;
            }
            
            // 钢筋计算特殊处理
            if (type === '8') {
                const tons = parseFloat(document.getElementById('steelAmount').value) || 0;
                fee = tons * 12; // 12元/吨
                
                detail = `
                    <p><strong>计费明细：</strong></p>
                    <p>钢筋使用量：${tons}吨</p>
                    <p>收费标准：12元/吨</p>
                    <p>计算：${tons} × 12 = ${fee.toFixed(2)}元</p>
                `;
                
                if (fee > 0 && fee < 2000) {
                    detail += `<p style="color:#f57c00;">注：按最低收费标准调整为2000元</p>`;
                    fee = 2000;
                }
                
                showResult(fee, detail);
                return;
            }
            
            // 结算审核特殊处理
            if (type === '5-1' || type === '5-2') {
                const auditAmount = parseFloat(document.getElementById('auditAmount').value) || 0;
                const reduceAmount = parseFloat(document.getElementById('reduceAmount').value) || 0;
                const increaseAmount = parseFloat(document.getElementById('increaseAmount').value) || 0;
                
                if (auditAmount <= 0) {
                    alert('请输入送审结算价');
                    return;
                }
                
                // 基本收费
                const config = rateTables['5-1'];
                const basicFee = calculateProgressive(auditAmount, config.rates);
                
                // 效益收费
                const benefitBase = reduceAmount + increaseAmount;
                const benefitFee = benefitBase * 0.05; // 5%
                
                if (type === '5-1') {
                    fee = basicFee;
                    detail = `
                        <p><strong>基本收费计算（差额定率累进）：</strong></p>
                        <p>送审结算价：${auditAmount}万元</p>
                        <p>计算过程：${generateProgressiveDetail(auditAmount, config.rates)}</p>
                        <p>基本收费：${basicFee.toFixed(2)}万元 = ${(basicFee * 10000).toFixed(2)}元</p>
                    `;
                    baseAmount = auditAmount;
                } else {
                    fee = basicFee + benefitFee;
                    detail = `
                        <p><strong>总收费 = 基本收费 + 效益收费</strong></p>
                        <p><strong>基本收费：</strong></p>
                        <p>送审结算价：${auditAmount}万元</p>
                        <p>计算过程：${generateProgressiveDetail(auditAmount, config.rates)}</p>
                        <p>基本收费：${basicFee.toFixed(2)}万元</p>
                        <p><strong>效益收费：</strong></p>
                        <p>核减额：${reduceAmount}万元 | 核增额：${increaseAmount}万元</p>
                        <p>效益收费基数：${benefitBase}万元</p>
                        <p>费率：5%</p>
                        <p>效益收费：${benefitFee.toFixed(2)}万元</p>
                        <p><strong>合计：${fee.toFixed(2)}万元 = ${(fee * 10000).toFixed(2)}元</strong></p>
                    `;
                    baseAmount = auditAmount;
                }
                
                // 转换元并检查最低收费
                fee = fee * 10000;
                if (fee < 2000 && fee > 0) {
                    detail += `<p style="color:#f57c00;">注：按最低收费标准调整为2000元</p>`;
                    fee = 2000;
                }
                
                showResult(fee, detail);
                return;
            }
            
            // 普通差额定率累进计算
            baseAmount = parseFloat(document.getElementById('baseAmount').value) || 0;
            if (baseAmount <= 0) {
                alert('请输入有效的收费基数');
                return;
            }
            
            const config = rateTables[type];
            if (!config) {
                alert('请选择有效的咨询项目类型');
                return;
            }
            
            // 纠纷鉴证特殊处理（双方有造价）
            if (type === '7-2') {
                const threshold = 1000;
                if (baseAmount <= threshold) {
                    fee = baseAmount * 0.05;
                    detail = `
                        <p><strong>计费方式：</strong>双方均有造价</p>
                        <p>争议差额：${baseAmount}万元（1000万元以内）</p>
                        <p>费率：5%</p>
                        <p>计算：${baseAmount} × 5% = ${fee.toFixed(2)}万元</p>
                    `;
                } else {
                    const lowPart = threshold * 0.05;
                    const highPart = (baseAmount - threshold) * 0.04;
                    fee = lowPart + highPart;
                    detail = `
                        <p><strong>计费方式：</strong>双方均有造价</p>
                        <p>争议差额：${baseAmount}万元（超过1000万元）</p>
                        <p>1000万元以内部分：1000 × 5% = ${lowPart.toFixed(2)}万元</p>
                        <p>1000万元以上部分：${(baseAmount - 1000).toFixed(2)} × 4% = ${highPart.toFixed(2)}万元</p>
                        <p>合计：${fee.toFixed(2)}万元</p>
                    `;
                }
            } else {
                // 标准差额定率累进
                fee = calculateProgressive(baseAmount, config.rates);
                detail = `
                    <p><strong>收费基数：</strong>${baseAmount}万元（${config.baseName}）</p>
                    <p><strong>差额定率累进计算：</strong></p>
                    <p>${generateProgressiveDetail(baseAmount, config.rates)}</p>
                    <p>合计：${fee.toFixed(4)}万元</p>
                `;
                
                if (config.note) {
                    detail += `<p style="color:#1976d2;margin-top:8px;">备注：${config.note}</p>`;
                }
            }
            
            // 转换元并检查最低收费
            fee = fee * 10000;
            if (fee < 2000 && fee > 0) {
                detail += `<p style="color:#f57c00;">注：按最低收费标准调整为2000元</p>`;
                fee = 2000;
            }
            
            showResult(fee, detail);
        }
        
        // 生成累进计算明细
        function generateProgressiveDetail(amount, rates) {
            let detail = [];
            let remaining = amount;
            let prevLimit = 0;
            
            for (let tier of rates) {
                const tierAmount = Math.min(remaining, tier.limit - prevLimit);
                if (tierAmount <= 0) break;
                
                const tierFee = tierAmount * tier.rate;
                const rateDisplay = (tier.rate * 1000).toFixed(1);
                
                if (tier.limit === Infinity) {
                    detail.push(`${tierAmount.toFixed(2)}万元 × ${rateDisplay}‰ = ${tierFee.toFixed(4)}万元`);
                } else {
                    detail.push(`${tierAmount.toFixed(2)}万元 × ${rateDisplay}‰ = ${tierFee.toFixed(4)}万元`);
                }
                
                remaining -= tierAmount;
                prevLimit = tier.limit;
                if (remaining <= 0) break;
            }
            
            return detail.join('<br>');
        }
        
        // 显示结果
        function showResult(fee, detailHtml) {
            document.getElementById('resultAmount').textContent = '¥' + fee.toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            document.getElementById('resultDetail').innerHTML = detailHtml;
            document.getElementById('resultCard').classList.add('show');
            
            // 滚动到结果区域
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // 初始化
        handleProjectChange();
    </script>
</body>
</html>
